name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Rebuild for Electron
        run: npx @electron/rebuild

      - name: Lint
        run: npm run lint

      - name: Run smoke tests
        run: npm test
